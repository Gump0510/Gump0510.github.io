<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经常访问的网站</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .container {
            display: inline-block;
            text-align: left;
            background: white;
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 20px 0;
            font-size: 1.2em;
        }
        a {
            text-decoration: none;
            color: #007acc;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: all 0.3s;
        }
        a:hover {
            background-color: #007acc;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌐 经常访问的网站</h1>
        <ul>
            <!-- 知乎 -->
            <li>
                <a href="https://www.zhihu.com" target="_blank">知乎 - 发现更大的世界</a>
            </li>
            
            <!-- 联合早报 -->
            <li>
                <a href="https://www.zaobao.com" target="_blank">联合早报 - 即时新闻</a>
            </li>
            
            <!-- 你可以在这里继续添加其他网站 -->
            <!-- <li>
                <a href="https://www.example.com" target="_blank">网站名称 - 网站描述</a>
            </li> -->
        </ul>
    </div>

</body>
</html>
